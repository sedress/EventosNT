<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos Locales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .filter-container {
            background-color: #e2e2e2;
            padding: 15px;
            border-radius: 5px;
        }
        .filter-container .dropdown,
        .filter-container .btn-primary {
            margin-right: 10px;
        }
        .calendar-container {
            background-color: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
        }
        .event-container {
            display: flex;
            gap: 20px;
        }
        .event-list {
            flex: 3;
        }
        aside {
            flex: 1;
        }
    </style>
</head>
<body>
<!-- Header -->
<header class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/Main/Main.html">
            <img src="/public/logo/Logo.png" alt="Logo" class="d-inline-block align-text-top">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="mostrarEventos()">Todos los Eventos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="mostrarEventosAsistire()">Eventos a los que asistiré</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/src/userProfile/UserPerfil.html" id="userProfile">Perfil</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/src/welcome/welcome.html" id="logout">Cerrar Sesión</a>
                </li>
            </ul>
        </div>
    </div>
</header>


    <!-- Contenedor de filtros y botón para mostrar todos los eventos -->
    <div class="filter-container container mt-4">
        <div class="event-filters d-flex align-items-center">
            <div class="dropdown">
                <button class="btn btn-secondary dropdown-toggle" type="button" id="dropdownMenuButton" data-bs-toggle="dropdown" aria-expanded="false">
                    Filtrar por tipo de evento
                </button>
                <ul class="dropdown-menu" aria-labelledby="dropdownMenuButton">
                    <li><a class="dropdown-item" href="#" onclick="filtrarEventos('deportes')">Deportes</a></li>
                    <li><a class="dropdown-item" href="#" onclick="filtrarEventos('informativos')">Informativos</a></li>
                    <li><a class="dropdown-item" href="#" onclick="filtrarEventos('música')">Música</a></li>
                    <li><a class="dropdown-item" href="#" onclick="filtrarEventos('cultural')">Cultural</a></li>
                    <li><a class="dropdown-item" href="#" onclick="filtrarEventos('gastronomía')">Gastronomía</a></li>
                    <li><a class="dropdown-item" href="#" onclick="filtrarEventos('educativo')">Educativo</a></li>
                    <li><a class="dropdown-item" href="#" onclick="filtrarEventos('moda')">Moda</a></li>
                    <li><a class="dropdown-item" href="#" onclick="filtrarEventos('todos')">Todos</a></li>
                </ul>
            </div>
            <button class="btn btn-primary d-flex align-items-center" onclick="mostrarTodosLosEventos()">
                <i class="bi bi-brush"></i> Limpiar
            </button>
            <!-- Contenedor del cuadro de texto y botón de búsqueda -->
            <div class="input-group ms-auto">
                <input type="text" id="searchInput" class="form-control" placeholder="Buscar evento...">
                <button class="btn btn-outline-secondary" type="button" onclick="buscarEventoPorNombre()">Buscar</button>
            </div>
        </div>
    </div>

<!-- Contenido principal -->
<main class="container mt-4">
    <div class="event-container">
        <section id="eventList" class="event-list">
            <!-- Aquí se agregarán dinámicamente los eventos -->
        </section>
        <aside>
            <div id="asideEventList">
                <!-- Aquí se agregarán dinámicamente los eventos ordenados por fecha -->
            </div>
        </aside>
    </div>
</main>


<!-- Footer -->
<footer class="text-center bg-dark text-light">
    <div class="container p-4">
        <div class="row">
            <div class="col-12">
                <p class="mb-0"><a href="/src/reportBug/ReportBugg.html" class="text-light">Reportar un problema</a></p>
            </div>
        </div>
        <div class="text-center p-3">
            &copy; 2024 Eventos Locales. Todos los derechos reservados.
        </div>
    </div>
</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.0/main.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.0/main.min.css">
    <script src="app.js"></script>
    <script src="filterFunctions.js"></script>
    <script src="userMenu.js"></script>
    <script src="search.js"></script>
    <script src="asideEvents.js"></script>
</body>
</html>
