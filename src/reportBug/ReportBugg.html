<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informe de Errores</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="/public/logo/Logo.png" alt="Logo">
    </header>

    <div class="error-report-container">
        <h2>Informe de Error</h2>
        <form id="error-report-form">
            <div class="form-group">
                <label for="short-description">Descripción Corta:</label>
                <input type="text" id="short-description" name="short-description" required>
            </div>
            <div class="form-group">
                <label for="full-name">Nombre y Apellidos:</label>
                <input type="text" id="full-name" name="full-name" required>
            </div>
            <div class="form-group">
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="detailed-description">Descripción Detallada:</label>
                <textarea id="detailed-description" name="detailed-description" rows="5" required></textarea>
            </div>
            <button type="submit">Enviar Informe</button>
        </form>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
